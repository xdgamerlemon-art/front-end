<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxury Hotel | Contact</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="css/style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="logo">Luxury Hotel | Messages</div>

      <nav>
        <a href="index.html">Home</a>
        <a href="rooms.html">Rooms</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
        <button id="theme-toggle" class="btn">Dark Mode</button>
      </nav>
    </header>
<section class="messages-page">
        <div class="container">
          <div class="messages-container">
            <div id="message-display" class="message-card-customer"></div>
          </div>
        </div>
</section>
    <footer>
      <p>© 2026 Luxury Hotel | All Rights Reserved</p>

      <div class="social-icons">
        <i class="fa-brands fa-facebook"></i>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-twitter"></i>
      </div>

      <a href="admin.html" class="admin-link"><i class="fa-solid fa-lock"></i></a>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <script>
      
      function applyTheme() {
        const isDark = localStorage.getItem('theme') === 'dark';
        if (isDark) {
          document.body.classList.add('dark');
        } else {
          document.body.classList.remove('dark');
        }
      }
      applyTheme();

      
      const themeToggle = document.getElementById('theme-toggle');
      if (themeToggle) {
        themeToggle.addEventListener('click', () => {
          const isDark = document.body.classList.toggle('dark');
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
          themeToggle.textContent = isDark ? 'Light Mode' : 'Dark Mode';
        });
        
        themeToggle.textContent = document.body.classList.contains('dark') ? 'Light Mode' : 'Dark Mode';
      }

      window.onload = function () {
        const name = localStorage.getItem("name") || "No name";
        const email = localStorage.getItem("email") || "No email";
        const message = localStorage.getItem("message") || "No message";
        const room = localStorage.getItem("room") || "Not specified";
        
        const messageCard = `
          <div class="message-info-box">
            <h3><i class="fa-solid fa-user"></i> Your Information</h3>
            <div class="info-item">
              <label>Name:</label>
              <span>${name}</span>
            </div>
            <div class="info-item">
              <label>Email:</label>
              <span>${email}</span>
            </div>
            <div class="info-item">
              <label>Room Selected:</label>
              <span class="room-highlight">${room}</span>
            </div>
          </div>
          <div class="message-content-box">
            <h3><i class="fa-solid fa-envelope"></i> Your Message</h3>
            <p>${message}</p>
          </div>
        `;
        
        document.getElementById("message-display").innerHTML = messageCard;
      };
    </script>
  </body>
</html>
