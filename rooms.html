<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxury Hotel | Rooms</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="css/style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="logo">
        Luxury Hotel <span class="logo-sep">|</span> Rooms
      </div>

      <nav>
        <a href="index.html">Home</a>
        <a href="rooms.html">Rooms</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
        <a href="meesages.html">Messages</a>
        <button id="theme-toggle" class="btn">Dark Mode</button>
      </nav>
    </header>

    <section class="rooms">
      <div class="container">
        <div class="row g-4 justify-content-center">
          <div class="col-12 col-md-6 col-lg-4 d-flex">
            <div class="room w-100">
              <img src="images/room1.jpg" class="img-fluid" />
              <h3>Standard Room</h3>
              <p>$120 / night</p>
              <button class="btn" onclick="bookroom('Standard Room')">
                Book Now
              </button>
            </div>
          </div>

          <div class="col-12 col-md-6 col-lg-4 d-flex">
            <div class="room w-100">
              <img src="images/room2.jpg" class="img-fluid" />
              <h3>Deluxe Room</h3>
              <p>$200 / night</p>
              <button class="btn" onclick="bookroom('Deluxe Room')">
                Book Now
              </button>
            </div>
          </div>

          <div class="col-12 col-md-6 col-lg-4 d-flex">
            <div class="room w-100">
              <img src="images/lobby.jpg" class="img-fluid" />
              <h3>Suite Room</h3>
              <p>$350 / night</p>
              <button class="btn" onclick="bookroom('Suite Room')">Book Now</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <p>© 2026 Luxury Hotel | All Rights Reserved</p>

      <div class="social-icons">
        <i class="fa-brands fa-facebook"></i>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-twitter"></i>
      </div>

      <a href="admin.html" class="admin-link"
        ><i class="fa-solid fa-lock"></i
      ></a>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <script>
      function applyTheme() {
        const isDark = localStorage.getItem("theme") === "dark";
        if (isDark) {
          document.body.classList.add("dark");
        } else {
          document.body.classList.remove("dark");
        }
      }
      applyTheme();

      const themeToggle = document.getElementById("theme-toggle");
      if (themeToggle) {
        themeToggle.addEventListener("click", () => {
          const isDark = document.body.classList.toggle("dark");
          localStorage.setItem("theme", isDark ? "dark" : "light");
          themeToggle.textContent = isDark ? "Light Mode" : "Dark Mode";
        });
        themeToggle.textContent = document.body.classList.contains("dark")
          ? "Light Mode"
          : "Dark Mode";
      }

      function bookroom(roomname) {
        localStorage.setItem("selectedRoom", roomname);
        alert(
          "You have selected the " +
            roomname +
            ". Please proceed to contact us for booking.",
        );
        window.location.href = "contact.html";
      }
    </script>
  </body>
</html>
