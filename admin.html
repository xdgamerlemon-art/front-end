<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxury Hotel | Admin Panel</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/admin.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="logo">Luxury Hotel - Admin Panel</div>
      <nav>
        <a href="index.html">Home</a>
        <button id="theme-toggle" class="btn">Dark Mode</button>
      </nav>
    </header>

    <section class="admin-section">
      <div class="container">
        <div id="login-container" class="login-container">
          <h1 class="page-title">Admin Login</h1>
          <form id="login-form">
            <input
              id="admin-password"
              type="password"
              placeholder="Enter Admin Password"
              required
            />
            <button type="submit">Login</button>
          </form>
        </div>

        <div id="dashboard-container" class="dashboard-container" style="display: none;">
          <div class="dashboard-header">
            <h1>Customer Messages</h1>
            <div class="dashboard-actions">
              <button id="clear-messages" class="btn-danger">Clear All Messages</button>
              <button id="logout-btn" class="btn">Logout</button>
            </div>
          </div>

          <div id="messages-list" class="messages-list">
            
          </div>

          <div id="no-messages" class="no-messages" style="display: none;">
            <p>No messages yet.</p>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <p>© 2026 Luxury Hotel | All Rights Reserved</p>

      <div class="social-icons">
        <i class="fa-brands fa-facebook"></i>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-twitter"></i>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <script>
      function applyTheme() {
        const isDark = localStorage.getItem('theme') === 'dark';
        if (isDark) {
          document.body.classList.add('dark');
        } else {
          document.body.classList.remove('dark');
        }
      }
      applyTheme();

      const themeToggle = document.getElementById('theme-toggle');
      if (themeToggle) {
        themeToggle.addEventListener('click', () => {
          const isDark = document.body.classList.toggle('dark');
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
          themeToggle.textContent = isDark ? 'Light Mode' : 'Dark Mode';
        });
        themeToggle.textContent = document.body.classList.contains('dark') ? 'Light Mode' : 'Dark Mode';
      }

      const ADMIN_PASSWORD = "admin123";

      document.getElementById("login-form").addEventListener("submit", function(e) {
        e.preventDefault();
        const password = document.getElementById("admin-password").value;

        if (password === ADMIN_PASSWORD) {
          sessionStorage.setItem("adminLoggedIn", "true");
          login();
        } else {
          alert("Invalid password!");
        }
      });

      function login() {
        document.getElementById("login-container").style.display = "none";
        document.getElementById("dashboard-container").style.display = "block";
        displayMessages();
      }

      function logout() {
        sessionStorage.removeItem("adminLoggedIn");
        document.getElementById("login-container").style.display = "block";
        document.getElementById("dashboard-container").style.display = "none";
        document.getElementById("admin-password").value = "";
      }

      function displayMessages() {
        const allMessages = JSON.parse(localStorage.getItem("allMessages")) || [];
        const messagesList = document.getElementById("messages-list");
        const noMessages = document.getElementById("no-messages");

        if (allMessages.length === 0) {
          messagesList.style.display = "none";
          noMessages.style.display = "block";
          return;
        }

        messagesList.style.display = "block";
        noMessages.style.display = "none";
        messagesList.innerHTML = "";

        allMessages.forEach((msg, index) => {
          const messageCard = document.createElement("div");
          messageCard.className = "message-card";
          messageCard.innerHTML = `
            <div class="message-header">
              <strong>${msg.name}</strong>
              <span class="message-time">${msg.timestamp}</span>
            </div>
            <div class="message-email">
              <strong>Email:</strong> ${msg.email}
            </div>
            <div class="message-room">
              <strong>Room:</strong> ${msg.room}
            </div>
            <div class="message-body">
              <strong>Message:</strong>
              <p>${msg.message}</p>
            </div>
            <button class="btn-delete" onclick="deleteMessage(${index})">Delete</button>
          `;
          messagesList.appendChild(messageCard);
        });
      }

      function deleteMessage(index) {
        const allMessages = JSON.parse(localStorage.getItem("allMessages")) || [];
        allMessages.splice(index, 1);
        localStorage.setItem("allMessages", JSON.stringify(allMessages));
        displayMessages();
      }

      document.getElementById("clear-messages").addEventListener("click", function() {
        if (confirm("Are you sure you want to clear all messages?")) {
          localStorage.removeItem("allMessages");
          displayMessages();
          alert("All messages cleared!");
        }
      });

      document.getElementById("logout-btn").addEventListener("click", logout);

      window.onload = function() {
        if (sessionStorage.getItem("adminLoggedIn") === "true") {
          login();
        }
      };
    </script>
  </body>
</html>
