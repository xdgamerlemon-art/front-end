<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxury Hotel | Contact</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="css/style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="logo">
        Luxury Hotel <span class="logo-sep">|</span> Contact
      </div>

      <nav>
        <a href="index.html">Home</a>
        <a href="rooms.html">Rooms</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
        <a href="meesages.html">Messages</a>
        <button id="theme-toggle" class="btn">Dark Mode</button>
      </nav>
    </header>

    <section class="contact">
      <div class="container">
        <button
          type="button"
          class="contact-tip-toggle"
          aria-controls="contact-tip"
          aria-expanded="false"
        >
          ?
        </button>
        <div class="row g-4 align-items-start">
          <div class="col-12 col-lg-4">
            <div class="contact-tip" id="contact-tip">
              <div class="contact-tip-title">
                <i class="fa-solid fa-circle-info"></i>
                Quick Tip
              </div>
              <p>
                Send us a message and we will reply to your email within 24 hours,
                or email us at luxuryhotel@gmail.com. If you need help sooner, call
                us at (555) 014-8899.
              </p>
            </div>
          </div>
          <div class="col-12 col-lg-8">
            <form id="contact-form">
              <input
                id="name"
                type="text"
                placeholder="Your Name"
                required
                class="form-control"
              />

              <input
                id="email"
                type="email"
                placeholder="Your Email"
                required
                class="form-control"
              />

              <textarea
                id="messages"
                placeholder="Your Message"
                required
                class="form-control"
              ></textarea>

              <button type="submit">Send Message</button>
            </form>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <p>© 2026 Luxury Hotel | All Rights Reserved</p>

      <div class="social-icons">
        <i class="fa-brands fa-facebook"></i>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-twitter"></i>
      </div>

      <a href="admin.html" class="admin-link"
        ><i class="fa-solid fa-lock"></i
      ></a>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <script>
      function applyTheme() {
        const isDark = localStorage.getItem("theme") === "dark";
        if (isDark) {
          document.body.classList.add("dark");
        } else {
          document.body.classList.remove("dark");
        }
      }
      applyTheme();

      const themeToggle = document.getElementById("theme-toggle");
      if (themeToggle) {
        themeToggle.addEventListener("click", () => {
          const isDark = document.body.classList.toggle("dark");
          localStorage.setItem("theme", isDark ? "dark" : "light");
          themeToggle.textContent = isDark ? "Light Mode" : "Dark Mode";
        });
        themeToggle.textContent = document.body.classList.contains("dark")
          ? "Light Mode"
          : "Dark Mode";
      }

      const tipToggle = document.querySelector(".contact-tip-toggle");
      const tipPanel = document.getElementById("contact-tip");

      if (tipToggle && tipPanel) {
        tipToggle.addEventListener("click", (event) => {
          event.stopPropagation();
          const isOpen = tipPanel.classList.toggle("is-open");
          tipToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });

        tipPanel.addEventListener("click", (event) => {
          event.stopPropagation();
        });

        document.addEventListener("click", () => {
          if (tipPanel.classList.contains("is-open")) {
            tipPanel.classList.remove("is-open");
            tipToggle.setAttribute("aria-expanded", "false");
          }
        });
      }

      document
        .getElementById("contact-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const name = document.getElementById("name").value;
          const email = document.getElementById("email").value;
          const message = document.getElementById("messages").value;
          const selectedRoom =
            localStorage.getItem("selectedRoom") || "Not specified";

          localStorage.setItem("name", name);
          localStorage.setItem("email", email);
          localStorage.setItem("message", message);
          localStorage.setItem("room", selectedRoom);

          let allMessages =
            JSON.parse(localStorage.getItem("allMessages")) || [];
          allMessages.push({
            name: name,
            email: email,
            message: message,
            room: selectedRoom,
            timestamp: new Date().toLocaleString(),
          });
          localStorage.setItem("allMessages", JSON.stringify(allMessages));

          alert("Message sent! View your messages on the Messages page.");
          this.reset();
          window.location.href = "meesages.html";
        });
    </script>
  </body>
</html>
